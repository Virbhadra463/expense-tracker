<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker Hero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      background: #f3f3f3;
      font-family: 'Inter', sans-serif;
    }

    .form-input {
      background: #f9f9f9;
      border: 1px solid #e5e5e5;
      transition: all 0.2s;
    }

    .form-input:focus {
      background: #ffffff;
      border-color: #5b2ccf;
      outline: none;
      box-shadow: 0 0 0 3px rgba(91, 44, 207, 0.1);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <!-- Top Bar -->
  <header class="w-full flex items-center justify-between px-6 lg:px-12 py-6">
    <div class="text-[#5b2ccf] font-bold text-2xl tracking-tight flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-[#5b2ccf] flex items-center justify-center text-white">
        <i data-lucide="wallet" class="w-5 h-5"></i>
      </div>
      SpendSmart
    </div>
  </header>

  <!-- Hero Content -->
  <main
    class="flex-1 flex flex-col lg:flex-row items-center justify-center px-6 lg:px-12 pb-12 gap-12 lg:gap-24 max-w-[1400px] mx-auto w-full">

    <!-- Left: Hero Text -->
    <div class="text-center lg:text-left flex-1 max-w-[700px]">
      <h1 class="text-[50px] lg:text-[78px] leading-[1.0] font-black text-black tracking-tight">
        Not just an expense tracker
      </h1>

      <p class="mt-8 text-gray-500 text-[20px] lg:text-[28px] leading-relaxed font-medium">
        a financial tool as well.
      </p>
    </div>

    <!-- Right: Auth Card -->
    <div id="auth-card"
      class="w-full max-w-[480px] bg-white rounded-[32px] p-8 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.1)] border border-white/50 relative overflow-hidden">

      <!-- Decorative element -->
      <div class="absolute top-0 right-0 w-32 h-32 bg-[#d8ff00]/10 rounded-bl-full -mr-8 -mt-8 pointer-events-none">
      </div>

      <!-- Tabs Container -->
      <div class="flex p-1.5 bg-gray-100/80 backdrop-blur-sm rounded-2xl mb-8 border border-gray-200">
        <button onclick="switchTab('login')" id="tab-login"
          class="flex-1 py-3 rounded-xl text-sm font-bold transition-all shadow-sm bg-white text-[#5b2ccf]">
          Log In
        </button>
        <button onclick="switchTab('register')" id="tab-register"
          class="flex-1 py-3 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form id="form-login" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Email or
            Username</label>
          <div class="relative group">
            <i data-lucide="mail"
              class="absolute left-4 top-3.5 w-5 h-5 text-gray-400 group-focus-within:text-[#5b2ccf] transition-colors"></i>
            <input type="email" placeholder="name@example.com"
              class="form-input w-full rounded-2xl py-3.5 pl-12 pr-4 font-semibold text-gray-900 placeholder-gray-400">
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2 ml-1">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">Password</label>
            <a href="#" class="text-xs font-bold text-[#5b2ccf] hover:underline">Forgot?</a>
          </div>
          <div class="relative group">
            <i data-lucide="lock"
              class="absolute left-4 top-3.5 w-5 h-5 text-gray-400 group-focus-within:text-[#5b2ccf] transition-colors"></i>
            <input type="password" placeholder="••••••••"
              class="form-input w-full rounded-2xl py-3.5 pl-12 pr-4 font-semibold text-gray-900 placeholder-gray-400">
          </div>
        </div>

        <button type="button" onclick="window.location.href='index.html'"
          class="w-full bg-[#5b2ccf] text-white font-bold text-lg py-4 rounded-2xl hover:bg-[#4a24a8] transition shadow-[0_10px_20px_-5px_rgba(91,44,207,0.3)] flex items-center justify-center gap-2 mt-4 hover:translate-y-[-2px]">
          Sign In <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </button>
      </form>

      <!-- Register Form -->
      <form id="form-register" class="space-y-4 hidden">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">First
              Name</label>
            <input type="text" placeholder="John"
              class="form-input w-full rounded-xl py-2.5 px-4 font-semibold text-gray-900 text-sm">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Last
              Name</label>
            <input type="text" placeholder="Doe"
              class="form-input w-full rounded-xl py-2.5 px-4 font-semibold text-gray-900 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label
              class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Birthdate</label>
            <input type="date" class="form-input w-full rounded-xl py-2.5 px-3 font-medium text-gray-500 text-sm">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Gender</label>
            <div class="relative">
              <select
                class="form-input w-full rounded-xl py-2.5 px-3 font-medium text-gray-500 appearance-none bg-transparent text-sm cursor-pointer">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
              <i data-lucide="chevron-down"
                class="absolute right-3 top-3 w-4 h-4 text-gray-400 pointer-events-none"></i>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Email</label>
          <div class="relative group">
            <i data-lucide="mail"
              class="absolute left-3 top-2.5 w-4 h-4 text-gray-400 group-focus-within:text-[#d8ff00] transition-colors"></i>
            <input type="email" placeholder="name@example.com"
              class="form-input w-full rounded-xl py-2.5 pl-10 pr-4 font-semibold text-gray-900 text-sm">
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Password</label>
          <div class="relative group">
            <i data-lucide="lock"
              class="absolute left-3 top-2.5 w-4 h-4 text-gray-400 group-focus-within:text-[#d8ff00] transition-colors"></i>
            <input type="password" placeholder="Create password"
              class="form-input w-full rounded-xl py-2.5 pl-10 pr-4 font-semibold text-gray-900 text-sm">
          </div>
        </div>

        <button type="button"
          class="w-full bg-[#d8ff00] text-black font-bold text-lg py-3.5 rounded-2xl hover:bg-[#c2e600] transition shadow-[0_10px_20px_-5px_rgba(216,255,0,0.4)] mt-2 hover:translate-y-[-2px]">
          Create Account
        </button>
      </form>
    </div>
  </main>

  <script>
    // Initialize Icons
    lucide.createIcons();

    function switchTab(tab) {
      const loginForm = document.getElementById('form-login');
      const registerForm = document.getElementById('form-register');
      const loginBtn = document.getElementById('tab-login');
      const registerBtn = document.getElementById('tab-register');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');

        loginBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all shadow-sm bg-white text-[#5b2ccf]";
        registerBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors";
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');

        registerBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold transition-all shadow-sm bg-white text-[#5b2ccf]";
        loginBtn.className = "flex-1 py-3 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors";
      }
    }
  </script>

</body>

</html>
